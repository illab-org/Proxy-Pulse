name: Build & Deploy

on:
  push:
    branches:
      - source

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: proxy-pulse-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: proxy-pulse-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: proxy-pulse-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: proxy-pulse-darwin-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure cross-compilation (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/proxy-pulse

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: source

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare main branch content
        run: |
          mkdir -p deploy/build
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            cp "$dir/proxy-pulse" "deploy/build/$name"
            chmod +x "deploy/build/$name"
          done
          cp config.example.yaml deploy/config.example.yaml
          cp run deploy/run
          chmod +x deploy/run
          cp README.md deploy/ 2>/dev/null || true
          cp README_CN.md deploy/ 2>/dev/null || true
          cp LICENSE deploy/ 2>/dev/null || true
          cp DISCLAIMER.md deploy/ 2>/dev/null || true
          cp DISCLAIMER_CN.md deploy/ 2>/dev/null || true
          cp TERMS_OF_USE.md deploy/ 2>/dev/null || true
          cp TERMS_OF_USE_CN.md deploy/ 2>/dev/null || true

      - name: Deploy to main branch
        run: |
          cd deploy
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b main
          git add -A
          git commit -m "deploy: update build $(date -u +%Y%m%d%H%M%S) from ${GITHUB_SHA::7}"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push origin main --force

name: Build & Release

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'static/**'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  version-bump:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Bump patch version and tag
        id: bump
        run: |
          CURRENT=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

          echo "Bumping $CURRENT → $NEW_VERSION"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

          # Update version in Cargo.toml
          sed -i "s/^version = \"$CURRENT\"/version = \"$NEW_VERSION\"/" Cargo.toml

          # Update version in Cargo.lock
          sed -i '/^name = "proxy-pulse"/{n;s/version = ".*"/version = "'"$NEW_VERSION"'"/}' Cargo.lock

          # Update version in src/main.rs
          sed -i "s/Proxy Pulse v$CURRENT/Proxy Pulse v$NEW_VERSION/" src/main.rs

          # Commit and tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: v$NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push origin main --tags

  build:
    needs: version-bump
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: proxy-pulse-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: proxy-pulse-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: proxy-pulse-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: proxy-pulse-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: proxy-pulse-windows-amd64
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: proxy-pulse-windows-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.version-bump.outputs.version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure cross-compilation (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/proxy-pulse

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/proxy-pulse.exe

  release:
    needs: [version-bump, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package artifacts
        run: |
          mkdir -p dist
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            if [ -f "$dir/proxy-pulse.exe" ]; then
              cp "$dir/proxy-pulse.exe" "dist/${name}.exe"
              cd dist && zip "${name}.zip" "${name}.exe" && rm "${name}.exe" && cd ..
            else
              cp "$dir/proxy-pulse" "dist/$name"
              chmod +x "dist/$name"
              cd dist && tar czf "$name.tar.gz" "$name" && rm "$name" && cd ..
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version-bump.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip

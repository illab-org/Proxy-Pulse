name: Build & Release

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'static/**'
      - 'Dockerfile'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  version-bump:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version and tag
        id: bump
        run: |
          CURRENT=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          CUR_MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          CUR_MINOR=$(echo "$CURRENT" | cut -d. -f2)

          # Get previous release tag version
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          PREV_VERSION="${PREV_TAG#v}"
          PREV_MAJOR=$(echo "$PREV_VERSION" | cut -d. -f1)
          PREV_MINOR=$(echo "$PREV_VERSION" | cut -d. -f2)

          if [ "$CUR_MAJOR" != "$PREV_MAJOR" ] || [ "$CUR_MINOR" != "$PREV_MINOR" ]; then
            # Major or minor changed — manual bump, use as-is
            NEW_VERSION="$CURRENT"
            echo "Manual version bump detected: $PREV_VERSION → $NEW_VERSION"
          else
            # Same major.minor — auto patch+1
            PATCH=$(echo "$CURRENT" | cut -d. -f3)
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="${CUR_MAJOR}.${CUR_MINOR}.${NEW_PATCH}"
            echo "Auto patch bump: $CURRENT → $NEW_VERSION"
          fi

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

          # Update version in Cargo.toml and Cargo.lock
          sed -i "s/^version = \"$CURRENT\"/version = \"$NEW_VERSION\"/" Cargo.toml
          sed -i '/^name = "proxy-pulse"/{n;s/version = ".*"/version = "'"$NEW_VERSION"'"/}' Cargo.lock

          # Commit and tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "release: v$NEW_VERSION [skip ci]"
          if git rev-parse "v$NEW_VERSION" >/dev/null 2>&1; then
            echo "Tag v$NEW_VERSION already exists, skipping"
          else
            git tag "v$NEW_VERSION"
          fi
          git push origin main --tags

  build:
    needs: version-bump
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            artifact: proxy-pulse-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04
            artifact: proxy-pulse-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: proxy-pulse-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: proxy-pulse-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: proxy-pulse-windows-amd64
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: proxy-pulse-windows-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.version-bump.outputs.version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure cross-compilation (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/proxy-pulse

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/proxy-pulse.exe

  release:
    needs: [version-bump, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package artifacts
        run: |
          mkdir -p dist
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            if [ -f "$dir/proxy-pulse.exe" ]; then
              cp "$dir/proxy-pulse.exe" "dist/${name}.exe"
              cd dist && zip "${name}.zip" "${name}.exe" && rm "${name}.exe" && cd ..
            else
              cp "$dir/proxy-pulse" "dist/$name"
              chmod +x "dist/$name"
              cd dist && tar czf "$name.tar.gz" "$name" && rm "$name" && cd ..
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version-bump.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip

  docker:
    needs: [version-bump, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.version-bump.outputs.version }}

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: proxy-pulse-linux-*

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Lowercase owner name
        run: echo "REPO_OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: openinfralabs
          password: ${{ secrets.DOCKERHUBTOKEN }}

      - name: Prepare binaries
        run: |
          mkdir -p build/amd64 build/arm64
          cp artifacts/proxy-pulse-linux-amd64/proxy-pulse build/amd64/proxy-pulse
          cp artifacts/proxy-pulse-linux-arm64/proxy-pulse build/arm64/proxy-pulse
          chmod +x build/amd64/proxy-pulse build/arm64/proxy-pulse

      - name: Build & push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.REPO_OWNER_LC }}/proxy-pulse:latest
            ghcr.io/${{ env.REPO_OWNER_LC }}/proxy-pulse:v${{ needs.version-bump.outputs.version }}
            docker.io/openinfralabs/proxy-pulse:latest
            docker.io/openinfralabs/proxy-pulse:v${{ needs.version-bump.outputs.version }}

name: Integration Tests

on:
  workflow_run:
    workflows: ["Build & Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to test (e.g. v1.4.3)'
        required: true

permissions:
  contents: read
  packages: read

jobs:
  resolve-version:
    name: Resolve release version
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - name: Determine tag
        id: ver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name')
          fi
          echo "Testing release: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  test-binary:
    name: Test ${{ matrix.artifact }}
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: proxy-pulse-linux-amd64
            ext: tar.gz
            binary: proxy-pulse-linux-amd64
            runner_cmd: ./proxy-pulse
          - os: ubuntu-latest
            artifact: proxy-pulse-linux-arm64
            ext: tar.gz
            binary: proxy-pulse-linux-arm64
            runner_cmd: qemu-aarch64-static ./proxy-pulse
            qemu: true
          - os: macos-latest
            artifact: proxy-pulse-darwin-amd64
            ext: tar.gz
            binary: proxy-pulse-darwin-amd64
            runner_cmd: arch -x86_64 ./proxy-pulse
          - os: macos-latest
            artifact: proxy-pulse-darwin-arm64
            ext: tar.gz
            binary: proxy-pulse-darwin-arm64
            runner_cmd: ./proxy-pulse
          - os: windows-latest
            artifact: proxy-pulse-windows-amd64
            ext: zip
            binary: proxy-pulse-windows-amd64.exe
            runner_cmd: ./proxy-pulse.exe
          - os: windows-latest
            artifact: proxy-pulse-windows-arm64
            ext: zip
            binary: proxy-pulse-windows-arm64.exe
            skip_run: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: test

      - name: Download release artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "${{ needs.resolve-version.outputs.tag }}" -p "${{ matrix.artifact }}.${{ matrix.ext }}" -R "${{ github.repository }}"
        shell: bash

      - name: Extract (tar.gz)
        if: matrix.ext == 'tar.gz'
        run: |
          tar xzf "${{ matrix.artifact }}.${{ matrix.ext }}"
          chmod +x "${{ matrix.binary }}"
          mv "${{ matrix.binary }}" proxy-pulse

      - name: Extract (zip)
        if: matrix.ext == 'zip'
        run: |
          unzip "${{ matrix.artifact }}.${{ matrix.ext }}"
          mv "${{ matrix.binary }}" proxy-pulse.exe
        shell: bash

      - name: Verify artifact exists
        if: matrix.skip_run
        run: echo "✓ Artifact ${{ matrix.artifact }} downloaded and extracted successfully (cannot run on this runner)"
        shell: bash

      - name: Install QEMU (Linux ARM64)
        if: matrix.qemu
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static

      - name: Start server
        if: "!matrix.skip_run"
        run: |
          ${{ matrix.runner_cmd }} &
          echo $! > /tmp/pp.pid
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8080/api/v1/health > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done
        shell: bash

      - name: Run integration tests
        if: "!matrix.skip_run"
        run: bash ./test/integration.sh http://127.0.0.1:8080
        shell: bash

      - name: Stop server
        if: "always() && !matrix.skip_run"
        run: |
          [ -f /tmp/pp.pid ] && kill "$(cat /tmp/pp.pid)" 2>/dev/null || true
        shell: bash

  test-docker:
    name: Test Docker image
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: test

      - name: Pull Docker image
        run: docker pull docker.io/openinfralabs/proxy-pulse:${{ needs.resolve-version.outputs.tag }}

      - name: Start container
        run: |
          docker run -d --name pp-test -p 8080:8080 \
            docker.io/openinfralabs/proxy-pulse:${{ needs.resolve-version.outputs.tag }}
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8080/api/v1/health > /dev/null 2>&1; then
              echo "Container ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run integration tests
        run: bash ./test/integration.sh http://127.0.0.1:8080

      - name: Docker logs
        if: failure()
        run: docker logs pp-test

      - name: Stop container
        if: always()
        run: docker rm -f pp-test 2>/dev/null || true
